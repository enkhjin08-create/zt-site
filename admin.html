<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Админ — Захиалгууд — Зөвхөн түүнд</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/images/logo-icon-64.png">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="gate" class="wrap" style="max-width:380px;padding-top:18vh">
  <p class="eyebrow">Дотоод хэрэглээ</p>
  <h1 style="font-size:26px">Админ нэвтрэлт</h1>
  <p class="lede">Зөвхөн дотоод ажилтанд зориулагдсан хэсэг.</p>
  <label class="field-label" style="margin-top:20px">PIN код</label>
  <input id="pin-input" class="field-input" type="password" inputmode="numeric" placeholder="••••" style="font-size:20px;text-align:center;letter-spacing:.3em" autofocus>
  <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="tryLogin()">Нэвтрэх →</button>
  <p id="gate-error" style="color:var(--ribbon-dark);font-size:13px;margin-top:10px;display:none">PIN буруу байна.</p>
</div>

<div id="dashboard" class="wrap" style="display:none;padding:40px 28px 90px;max-width:1180px">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px">
    <div>
      <p class="eyebrow">Дотоод хэрэглээ</p>
      <h1 style="font-size:30px">Орж ирсэн захиалгууд</h1>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost btn-sm" onclick="loadOrders()">Шинэчлэх ↻</button>
      <a class="btn btn-ghost btn-sm" href="index.html">Сайт руу буцах</a>
      <button class="btn btn-outline btn-sm" onclick="logout()">Гарах</button>
    </div>
  </div>

  <div id="stat-row" style="display:flex;gap:14px;margin:26px 0 22px;flex-wrap:wrap"></div>
  <div class="filter-pills" id="status-pills"></div>
  <div id="order-list" style="display:flex;flex-direction:column;gap:14px;margin-top:6px"></div>
  <div class="empty-state" id="order-empty" style="display:none">Захиалга алга байна.</div>
</div>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script src="assets/orders.js"></script>
<script>
const STATUSES = {
  new:       { label: "Шинэ",         color: "#FF6698" },
  confirmed: { label: "Баталгаажсан", color: "#0F4B42" },
  done:      { label: "Хийгдсэн",     color: "#15140F" },
  cancelled: { label: "Цуцалсан",     color: "#9AA39F" }
};

let ordersCache = [];
let activeStatus = "all";
let adminPin = "";

async function tryLogin(){
  const v = document.getElementById("pin-input").value.trim();
  if(!v) return;
  const btn = document.querySelector('#gate .btn-primary');
  if(btn){ btn.disabled = true; btn.textContent = "Шалгаж байна..."; }
  try{
    const orders = await adminListOrders(v);
    adminPin = v;
    sessionStorage.setItem("zt_admin_pin", v);
    document.getElementById("gate-error").style.display = "none";
    ordersCache = orders;
    showDashboard(true);
  }catch(e){
    document.getElementById("gate-error").textContent = (e.status === 401) ? "PIN буруу байна." : "Холбогдоход алдаа гарлаа. Дахин оролдоорой.";
    document.getElementById("gate-error").style.display = "block";
  }
  if(btn){ btn.disabled = false; btn.textContent = "Нэвтрэх →"; }
}
document.getElementById("pin-input").addEventListener("keydown", e => { if(e.key === "Enter") tryLogin(); });

function logout(){ sessionStorage.removeItem("zt_admin_pin"); adminPin = ""; location.reload(); }

function showDashboard(skipLoad){
  document.getElementById("gate").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  if(skipLoad){
    ordersCache.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    renderStats(); renderPills(); renderList();
  }else{
    loadOrders();
  }
}

async function loadOrders(){
  const list = document.getElementById("order-list");
  list.innerHTML = `<p class="lede">Уншиж байна...</p>`;
  document.getElementById("order-empty").style.display = "none";
  try{
    ordersCache = await adminListOrders(adminPin);
    ordersCache.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    renderStats();
    renderPills();
    renderList();
  }catch(e){
    if(e.status === 401){
      logout();
      return;
    }
    list.innerHTML = `<p class="lede">Уншихад алдаа гарлаа. Netlify Function (netlify/functions/orders.js) болон Environment Variables зөв тохирсон эсэхийг шалгаарай — README.md-г үзээрэй.</p>`;
  }
}

function renderStats(){
  const row = document.getElementById("stat-row");
  const counts = {};
  Object.keys(STATUSES).forEach(k => counts[k] = ordersCache.filter(o => o.status === k).length);
  row.innerHTML = `
    <div style="background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 20px;min-width:110px">
      <div style="font-size:12px;color:var(--ink-faint);font-weight:700">Нийт</div>
      <div style="font-family:var(--font-display);font-size:26px">${ordersCache.length}</div>
    </div>` +
    Object.entries(STATUSES).map(([k,s]) => `
    <div style="background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 20px;min-width:110px">
      <div style="font-size:12px;color:var(--ink-faint);font-weight:700">${s.label}</div>
      <div style="font-family:var(--font-display);font-size:26px;color:${s.color}">${counts[k] || 0}</div>
    </div>`).join("");
}

function renderPills(){
  const pills = [["all","Бүгд"], ...Object.entries(STATUSES).map(([k,s]) => [k, s.label])];
  document.getElementById("status-pills").innerHTML = pills.map(([k,label]) =>
    `<button class="pill ${activeStatus===k?"is-active":""}" onclick="setStatusFilter('${k}')">${label}</button>`).join("");
}
function setStatusFilter(k){ activeStatus = k; renderPills(); renderList(); }

function renderList(){
  let list = ordersCache.slice();
  if(activeStatus !== "all") list = list.filter(o => o.status === activeStatus);
  const wrap = document.getElementById("order-list");
  const empty = document.getElementById("order-empty");
  if(!list.length){ wrap.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";
  wrap.innerHTML = list.map(orderCardHTML).join("");
}

function orderCardHTML(o){
  const st = STATUSES[o.status] || STATUSES.new;
  let date = "—";
  try{ date = new Date(o.createdAt).toLocaleString("mn-MN"); }catch(e){}
  const itemsHTML = (o.items || []).map(i =>
    `<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0"><span>${escapeHTML(i.name)}</span><span>${formatPrice(i.price)}</span></div>`).join("");
  const safeName = escapeHTML(o.customerName || "Нэр өгөгдөөгүй");
  const safePhone = escapeHTML(o.customerPhone || "");
  const safeRecipient = escapeHTML(o.recipient || "—");
  const safeMessage = escapeHTML(o.message || "");
  const safeOrderNo = escapeHTML(o.orderNumber || "—");
  const hasDelivery = typeof o.deliveryFee === "number";
  const subtotal = hasDelivery ? o.subtotal : o.total;
  const grandTotal = o.total || 0;

  return `<div style="background:#fff;border:1px solid var(--line);border-left:4px solid ${st.color};border-radius:16px;padding:20px 22px">
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-weight:700;font-size:15px">${safeName} · <a href="tel:${safePhone}" style="color:var(--ribbon-dark)">${safePhone || "—"}</a></div>
        <div style="font-size:12.5px;color:var(--ink-faint);margin-top:2px">${date} · Хүлээн авагч: ${safeRecipient}</div>
        <div style="font-size:12.5px;margin-top:4px"><span style="background:var(--paper-deep);padding:3px 9px;border-radius:999px;font-weight:700">№ ${safeOrderNo}</span></div>
      </div>
      <select class="pill" style="border-color:${st.color};font-size:12.5px" onchange="changeStatus('${o.id}', this.value)">
        ${Object.entries(STATUSES).map(([k,s]) => `<option value="${k}" ${o.status===k?"selected":""}>${s.label}</option>`).join("")}
      </select>
    </div>
    <div style="margin-top:12px;border-top:1px dashed var(--line);padding-top:10px">
      ${o.container ? `<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0"><span>📦 ${escapeHTML(o.container.name)}</span><span>${formatPrice(o.container.price)}</span></div>` : `<div style="font-size:12.5px;color:var(--ink-faint)">Сав: бор цаасан уут</div>`}
      ${itemsHTML || `<div style="font-size:12.5px;color:var(--ink-faint)">Гол бэлэг сонгоогүй</div>`}
    </div>
    ${o.message ? `<div style="margin-top:10px;font-family:var(--font-hand);font-size:18px;color:var(--ink-soft);background:var(--paper-deep);border-radius:10px;padding:8px 14px">"${safeMessage}"</div>` : ""}
    <div style="margin-top:10px;border-top:1px dashed var(--line);padding-top:10px">
      ${hasDelivery ? `<div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-faint)"><span>Барааны дүн</span><span>${formatPrice(subtotal)}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-faint)"><span>Хүргэлт</span><span>${formatPrice(o.deliveryFee)}</span></div>` : ""}
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:13px;font-weight:700">Нийт төлөх</span>
        <span style="font-family:var(--font-display);font-weight:700;color:var(--ribbon-dark);font-size:18px">${formatPrice(grandTotal)}</span>
      </div>
    </div>
  </div>`;
}

async function changeStatus(id, status){
  try{
    await adminUpdateStatus(adminPin, id, status);
    const o = ordersCache.find(x => x.id === id);
    if(o) o.status = status;
    renderStats();
    toast("Төлөв шинэчлэгдлээ");
  }catch(e){
    if(e.status === 401){ logout(); return; }
    toast("Шинэчлэхэд алдаа гарлаа");
    loadOrders();
  }
}

const savedPin = sessionStorage.getItem("zt_admin_pin");
if(savedPin){ adminPin = savedPin; showDashboard(false); }
</script>
</body>
</html>
