<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Бүтээгдэхүүн — Зөвхөн түүнд</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/images/logo-icon-64.png">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header"></header>

<div class="wrap page-head">
  <p class="crumb"><a href="index.html">Нүүр</a> / Бүтээгдэхүүн</p>
  <h1 id="page-title">Бүтээгдэхүүн</h1>
  <p class="lede" id="page-sub">Дэлгүүрийн бүх бүтээгдэхүүнүүд</p>
</div>

<div class="wrap section" style="padding-top:40px">
  <button id="filters-toggle" class="btn btn-outline btn-sm" onclick="toggleFilters()" style="margin-bottom:16px">
    🔍 Хайх, шүүх<span id="filters-badge"></span> <span id="filters-chevron">▾</span>
  </button>

  <div id="filters-panel" style="display:none">
    <input id="search-input" class="field-input" type="text" placeholder="🔍 Бүтээгдэхүүний нэрээр хайх..." style="margin-bottom:18px;max-width:360px">
    <div class="filter-pills" id="rec-pills"></div>
    <div class="filter-pills" id="budget-pills" style="margin-top:-14px"></div>
    <div class="sort-row">
      <select id="sort-select" class="field-input">
        <option value="default">Шинэ нь эхэндээ</option>
        <option value="price-asc">Үнэ: багаас ихэд</option>
        <option value="price-desc">Үнэ: ихээс багад</option>
      </select>
    </div>
  </div>

  <div id="groups-wrap"></div>
  <div class="empty-state" id="empty" style="display:none">Тохирох бараа олдсонгүй. Хайлт/шүүлтүүрээ өөрчилж үзээрэй.</div>
</div>

<footer class="site-footer"></footer>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script src="assets/products-api.js"></script>
<script>
renderHeader("category.html");
renderFooter();

const params = new URLSearchParams(location.search);
let activeRec = params.get("recipient") || "all";
let activeBudget = params.get("budget") || "all";
let activeSort = params.get("sort") || "default";
let activeSearch = params.get("q") || "";

// Ямар категори нээлттэй байгааг хадгална
const openGroups = new Set();

document.getElementById("search-input").value = activeSearch;

const BUDGET_TIERS = [
  ["all", "Бүх үнэ"],
  ["0-20000", "20,000₮ хүртэл"],
  ["20000-40000", "20,000–40,000₮"],
  ["40000-60000", "40,000–60,000₮"],
  ["60000-100000", "60,000–100,000₮"],
  ["100000-99999999", "100,000₮+"]
];

function pillsHTML(){
  const recPills = [["all","Бүх хүлээн авагч"], ...Object.entries(RECIPIENTS).map(([k,r])=>[k, r.emoji+" "+r.label])];
  document.getElementById("rec-pills").innerHTML = recPills.map(([k,label]) =>
    `<button class="pill ${activeRec===k?"is-active":""}" data-rec="${k}" style="font-size:12.5px">${label}</button>`).join("");

  document.getElementById("budget-pills").innerHTML = BUDGET_TIERS.map(([k,label]) =>
    `<button class="pill ${activeBudget===k?"is-active":""}" data-budget="${k}" style="font-size:12.5px">${label}</button>`).join("");

  document.getElementById("sort-select").value = activeSort;
  updateFiltersBadge();
}

function applyFiltersSort(list){
  if(activeSearch) list = list.filter(p => p.name.toLowerCase().includes(activeSearch.toLowerCase()));
  if(activeRec !== "all") list = list.filter(p => (p.recipients||[]).includes(activeRec));
  if(activeBudget !== "all"){
    const [min,max] = activeBudget.split("-").map(Number);
    list = list.filter(p => p.price >= min && p.price <= max);
  }
  if(activeSort === "price-asc") list.sort((a,b) => (a.soldOut - b.soldOut)||(a.price - b.price));
  else if(activeSort === "price-desc") list.sort((a,b) => (a.soldOut - b.soldOut)||(b.price - a.price));
  else list.sort((a,b) => (a.soldOut - b.soldOut)||(b.id - a.id));
  return list;
}

function toggleGroup(catKey){
  if(openGroups.has(catKey)) openGroups.delete(catKey);
  else openGroups.add(catKey);
  renderGroups();
}

function renderGroups(){
  const wrap = document.getElementById("groups-wrap");
  const empty = document.getElementById("empty");

  // Ангилал бүрийн бараануудыг гарга
  const grouped = [];
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    let list = PRODUCTS.filter(p => p.category === key);
    list = applyFiltersSort(list);
    if(list.length) grouped.push({ key, cat, list });
  });

  if(!grouped.length){ wrap.innerHTML = ""; empty.style.display="block"; return; }
  empty.style.display = "none";

  wrap.innerHTML = grouped.map(({ key, cat, list }) => {
    const isOpen = openGroups.has(key);
    return `
      <div class="cat-group" style="margin-bottom:8px;border:1px solid var(--line);border-radius:20px;overflow:hidden">
        <button class="cat-group-header" onclick="toggleGroup('${key}')" style="width:100%;display:flex;align-items:center;gap:14px;padding:18px 20px;background:${isOpen?"var(--paper-deep)":"var(--paper-card)"};border:none;cursor:pointer;text-align:left">
          <div style="width:40px;height:40px;border-radius:12px;background:${cat.tint};display:flex;align-items:center;justify-content:center;color:${cat.color};flex-shrink:0">
            <svg viewBox="0 0 100 100" width="20" height="20">${categoryIconSvg(key)}</svg>
          </div>
          <div style="flex:1">
            <div style="font-weight:700;font-size:15px;color:var(--ink)">${cat.label}</div>
            <div style="font-size:12.5px;color:var(--ink-faint)">${list.length} бараа</div>
          </div>
          <span style="font-size:18px;color:var(--ink-faint);transition:transform .2s;display:inline-block;transform:rotate(${isOpen?"180deg":"0deg"})"
          >▾</span>
        </button>
        ${isOpen ? `
          <div style="padding:16px 16px 20px">
            <div class="product-grid">${list.map(productCardHTML).join("")}</div>
          </div>` : ""}
      </div>`;
  }).join("");
}

function activeFilterCount(){
  let n = 0;
  if(activeSearch) n++;
  if(activeRec !== "all") n++;
  if(activeBudget !== "all") n++;
  if(activeSort !== "default") n++;
  return n;
}
function updateFiltersBadge(){
  const n = activeFilterCount();
  document.getElementById("filters-badge").textContent = n ? ` (${n})` : "";
}
function toggleFilters(){
  const panel = document.getElementById("filters-panel");
  const chevron = document.getElementById("filters-chevron");
  const isOpen = panel.style.display !== "none";
  panel.style.display = isOpen ? "none" : "";
  chevron.textContent = isOpen ? "▾" : "▴";
}
function updateUrl(){
  history.replaceState(null, "", `?recipient=${activeRec}&budget=${activeBudget}&sort=${activeSort}&q=${encodeURIComponent(activeSearch)}`);
}

document.addEventListener("click", (e) => {
  const recBtn = e.target.closest("[data-rec]");
  if(recBtn){ activeRec = recBtn.dataset.rec; pillsHTML(); renderGroups(); updateUrl(); }
  const budgetBtn = e.target.closest("[data-budget]");
  if(budgetBtn){ activeBudget = budgetBtn.dataset.budget; pillsHTML(); renderGroups(); updateUrl(); }
});
document.getElementById("sort-select").addEventListener("change", (e) => {
  activeSort = e.target.value; renderGroups(); updateUrl(); updateFiltersBadge();
});
let searchDebounce = null;
document.getElementById("search-input").addEventListener("input", (e) => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    activeSearch = e.target.value.trim(); renderGroups(); updateUrl(); updateFiltersBadge();
  }, 250);
});

// Анхлан URL-д тодорхой ангилал байвал тэрийг нээлттэй эхэл
const initCat = params.get("cat");
if(initCat && initCat !== "all") openGroups.add(initCat);
else Object.keys(CATEGORIES).forEach(k => openGroups.add(k)); // бүгдийг нээлттэй эхэл

pillsHTML();
renderGroups();
if(activeFilterCount() > 0) toggleFilters();

(async function(){
  await initProducts();
  pillsHTML();
  renderGroups();
})();
</script>
</body>
</html>
