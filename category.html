<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Бүтээгдэхүүн — Зөвхөн түүнд</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/images/logo-icon-64.png">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header"></header>

<div class="wrap page-head">
  <p class="crumb"><a href="index.html">Нүүр</a> / Бүтээгдэхүүн</p>
  <h1 id="page-title">Бүтээгдэхүүн</h1>
  <p class="lede" id="page-sub">zuvhuntuund.com дэлгүүрийн агуулахаас. Захиалга баталгаажуулалт, хүргэлт — Zochil дэлгүүрээр.</p>
</div>

<div class="wrap section" style="padding-top:18px">
  <div class="filter-pills" id="cat-pills"></div>
  <div class="filter-pills" id="rec-pills" style="margin-top:-14px"></div>
  <div class="filter-pills" id="budget-pills" style="margin-top:-14px"></div>

  <div class="sort-row">
    <select id="sort-select" class="field-input">
      <option value="default">Шинэ нь эхэндээ</option>
      <option value="price-asc">Үнэ: багаас ихэд</option>
      <option value="price-desc">Үнэ: ихээс багад</option>
    </select>
  </div>

  <div class="product-grid" id="grid"></div>
  <div class="empty-state" id="empty" style="display:none">Энэ ангилалд одоогоор бараа алга байна. Өөр шүүлтүүр сонгоод үзээрэй.</div>
</div>

<footer class="site-footer"></footer>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script src="assets/products-api.js"></script>
<script>
renderHeader("category.html");
renderFooter();

const params = new URLSearchParams(location.search);
let activeCat = params.get("cat") || "all";
let activeRec = params.get("recipient") || "all";
let activeBudget = params.get("budget") || "all";
let activeSort = params.get("sort") || "default";

const BUDGET_TIERS = [
  ["all", "Бүх үнэ"],
  ["0-20000", "20,000₮ хүртэл"],
  ["20000-40000", "20,000–40,000₮"],
  ["40000-60000", "40,000–60,000₮"],
  ["60000-100000", "60,000–100,000₮"],
  ["100000-99999999", "100,000₮+"]
];

function pillsHTML(){
  const catPills = [["all","Бүгд"], ...Object.entries(CATEGORIES).map(([k,c])=>[k,c.label])];
  document.getElementById("cat-pills").innerHTML = catPills.map(([k,label]) =>
    `<button class="pill ${activeCat===k?"is-active":""}" data-cat="${k}">${label}</button>`).join("");

  const recPills = [["all","Бүх хүлээн авагч"], ...Object.entries(RECIPIENTS).map(([k,r])=>[k, r.emoji+" "+r.label])];
  document.getElementById("rec-pills").innerHTML = recPills.map(([k,label]) =>
    `<button class="pill ${activeRec===k?"is-active":""}" data-rec="${k}" style="font-size:12.5px;opacity:.85">${label}</button>`).join("");

  document.getElementById("budget-pills").innerHTML = BUDGET_TIERS.map(([k,label]) =>
    `<button class="pill ${activeBudget===k?"is-active":""}" data-budget="${k}" style="font-size:12.5px;opacity:.85">${label}</button>`).join("");

  document.getElementById("sort-select").value = activeSort;
}

function updateUrl(){
  history.replaceState(null, "", `?cat=${activeCat}&recipient=${activeRec}&budget=${activeBudget}&sort=${activeSort}`);
}

function renderGrid(){
  let list = PRODUCTS.slice();
  if(activeCat !== "all") list = list.filter(p => p.category === activeCat);
  if(activeRec !== "all") list = list.filter(p => p.recipients.includes(activeRec));
  if(activeBudget !== "all"){
    const [min,max] = activeBudget.split("-").map(Number);
    list = list.filter(p => p.price >= min && p.price <= max);
  }

  if(activeSort === "price-asc") list.sort((a,b) => (a.soldOut - b.soldOut) || (a.price - b.price));
  else if(activeSort === "price-desc") list.sort((a,b) => (a.soldOut - b.soldOut) || (b.price - a.price));
  else list.sort((a,b) => (a.soldOut - b.soldOut) || (b.id - a.id));

  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  if(list.length === 0){ grid.innerHTML = ""; empty.style.display="block"; return; }
  empty.style.display = "none";
  grid.innerHTML = list.map(productCardHTML).join("");

  const title = activeCat === "all" ? "Бүтээгдэхүүн" : (CATEGORIES[activeCat] ? CATEGORIES[activeCat].label : "Бүтээгдэхүүн");
  document.getElementById("page-title").textContent = title;
  document.title = title + " — Зөвхөн түүнд";
}

document.addEventListener("click", (e) => {
  const catBtn = e.target.closest("[data-cat]");
  if(catBtn){ activeCat = catBtn.dataset.cat; pillsHTML(); renderGrid(); updateUrl(); }
  const recBtn = e.target.closest("[data-rec]");
  if(recBtn){ activeRec = recBtn.dataset.rec; pillsHTML(); renderGrid(); updateUrl(); }
  const budgetBtn = e.target.closest("[data-budget]");
  if(budgetBtn){ activeBudget = budgetBtn.dataset.budget; pillsHTML(); renderGrid(); updateUrl(); }
});

document.getElementById("sort-select").addEventListener("change", (e) => {
  activeSort = e.target.value;
  renderGrid();
  updateUrl();
});

pillsHTML();
renderGrid();
(async function(){
  await initProducts();
  pillsHTML();
  renderGrid();
})();
</script>
</body>
</html>
