<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Бүтээгдэхүүн дэлгэрэнгүй — Зөвхөн түүнд</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/images/logo-icon-64.png">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header"></header>

<div class="wrap" id="content"></div>

<div class="wrap section">
  <div class="section-head" style="margin-top:8px">
    <div><h2>Төстэй бэлэг</h2></div>
  </div>
  <div class="product-grid" id="related"></div>
</div>

<footer class="site-footer"></footer>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script src="assets/products-api.js"></script>
<script>
renderHeader("category.html");
renderFooter();

const DESCRIPTIONS = {
  cup: "Өдөр тутмын дулаан мэдрэмж — кофе, цай уух дуртай хүндээ тохирсон CuteCup аяга. Гараар сонгож, хайрцагтаа нэмээрэй.",
  giftset: "Хэд хэдэн зүйл нэг дор уядаг бэлгийн багц. Өөрөө хайрцаглаж дахин уях шаардлагагүй — шууд бэлэг болгон өргөж болно.",
  flower: "Шинэхэн цэцгийн баглаа. Хайрцагтай хослуулж, эсвэл дан өргөж болно.",
  extra: "Хайрцагаа өнгөлөх жижиг мэдрэмж — захидал, лаа, нэг хуудас сэтгэл хөдлөл.",
  box: "Бэлгээ сайхан өргөхөд хэрэгтэй сав, баглаа боодлын суурь хэсэг.",
  greeting: "Хайрцагтайгаа хамт очих дулаан мэндчилгээ — хэдхэн үгээр сэтгэлээ илэрхийлээрэй."
};
function descriptionFor(p){
  return DESCRIPTIONS[p.category] || "Зөвхөн түүнд тань зориулсан онцгой бэлэг.";
}

function switchMainImage(url, btn){
  const mainImg = document.getElementById("main-art-img");
  if(mainImg) mainImg.src = url;
  document.querySelectorAll("#thumb-strip button").forEach(b => b.style.borderColor = "var(--line)");
  btn.style.borderColor = "var(--ribbon)";
}

(async function(){
  await initProducts();

  const id = Number(new URLSearchParams(location.search).get("id"));
  const p = getProduct(id);
  const content = document.getElementById("content");

  if(!p){
    content.innerHTML = `<div class="empty-state"><h2>Бараа олдсонгүй</h2><p>Холбоос буруу байж магадгүй.</p><a class="btn btn-primary" href="category.html" style="margin-top:14px">Бүтээгдэхүүн рүү буцах</a></div>`;
    return;
  }

  document.title = p.name + " — Зөвхөн түүнд";
  const cat = CATEGORIES[p.category];
  const images = (p.images && p.images.length) ? p.images : (p.image ? [p.image] : []);

  const galleryHTML = images.length > 1 ? `
    <div class="product-art is-detail" style="background:${cat.tint}">
      ${p.soldOut ? `<span class="badge sold">Дууссан</span>` : (p.oldPrice ? `<span class="badge">-${Math.round(100 - (p.price/p.oldPrice*100))}%</span>` : "")}
      <img id="main-art-img" src="${images[0]}" alt="${escapeHTML(p.name)}" style="width:100%;height:100%;object-fit:cover;object-position:center 25%">
    </div>
    <div id="thumb-strip" style="display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding-bottom:4px">
      ${images.map((url,i) => `
        <button type="button" onclick="switchMainImage('${url}', this)" style="width:64px;height:64px;border-radius:10px;overflow:hidden;border:2px solid ${i===0?"var(--ribbon)":"var(--line)"};padding:0;cursor:pointer;flex-shrink:0;background:none">
          <img src="${url}" style="width:100%;height:100%;object-fit:cover" alt="">
        </button>`).join("")}
    </div>
  ` : productArtHTML(p, {detail: true});

  content.innerHTML = `
    <p class="crumb"><a href="index.html">Нүүр</a> / <a href="category.html?cat=${p.category}">${cat.label}</a> / ${p.name}</p>
    <div class="product-detail-grid">
      <div>${galleryHTML}</div>
      <div>
        <p class="eyebrow">${cat.label}</p>
        <h1 style="font-size:32px">${p.name}</h1>
        <div class="price-row" style="margin:14px 0 18px">
          <span class="price" style="font-size:26px">${formatPrice(p.price)}</span>
          ${p.oldPrice ? `<span class="price-old">${formatPrice(p.oldPrice)}</span>` : ""}
          ${p.soldOut ? `<span class="badge sold" style="position:static">Дууссан</span>` : ""}
        </div>
        <p class="lede">${descriptionFor(p)}</p>
        <div style="display:flex;gap:12px;margin-top:26px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="addToBox(${p.id})" ${p.soldOut ? "disabled" : ""}>Хайрцагт нэмэх</button>
          
        </div>
        ${!p.image ? `<p style="font-size:12.5px;color:var(--ink-faint);margin-top:14px">Бодит зураг удахгүй шинэчлэгдэнэ.</p>` : ""}
      </div>
    </div>`;

  const related = PRODUCTS.filter(x => x.category === p.category && x.id !== p.id).slice(0,4);
  document.getElementById("related").innerHTML = related.map(productCardHTML).join("");
})();
</script>
</body>
</html>
